# sian-process-intelligence — Projeto dbt
# Transformações para Process Intelligence (case base + event log).
# Fonte: BigQuery (dados Protheus já carregados). Ver ADR-002.

name: "sian_process_intelligence"
version: "0.1.0"
config-version: 2
profile: "sian_process_intelligence"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Ajustar conforme ambiente (override em profiles ou env)
  raw_dataset: "{{ env_var('BQ_DATASET_RAW', 'raw_protheus') }}"
  analytics_dataset: "{{ env_var('BQ_DATASET_ANALYTICS', 'analytics_process') }}"

models:
  sian_process_intelligence:
    financeiro:
      contas_pagar:
        +schema: financeiro
        +tags:
          - process_intelligence
          - contas_pagar
